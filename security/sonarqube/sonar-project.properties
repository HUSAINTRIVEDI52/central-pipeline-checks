# sonar-project.properties
# Place this at your repository root

sonar.projectKey=${SONAR_PROJECT_KEY}
sonar.projectName=My Node.js App - Sandbox
sonar.projectVersion=1.0

# Source directories
sonar.sources=src
sonar.tests=test,tests,__tests__

# Exclusions — skip node_modules and generated files
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.github/**,**/coverage/**

# Test exclusions
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/__tests__/**

# Coverage report (optional — if you run tests)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
