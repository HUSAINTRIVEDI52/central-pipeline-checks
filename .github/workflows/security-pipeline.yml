name: Security Scanning Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Self-hosted runner on GCP VM handles everything.
# Auto-installs Node.js, Docker if not present on VM.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      zap_scan_type:
        description: "ZAP scan type (baseline or full)"
        required: false
        default: "baseline"
        type: choice
        options:
          - baseline
          - full

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — PREPARE + AUTO-INSTALL MISSING TOOLS
  # ───────────────────────────────────────────────────────────────────────────
  prepare:
    name: "Prepare Scan Environment"
    runs-on: self-hosted
    outputs:
      zap_mode:    ${{ steps.zap-mode.outputs.mode }}
      short_sha:   ${{ steps.meta.outputs.short_sha }}
      run_date:    ${{ steps.meta.outputs.run_date }}
      report_name: ${{ steps.meta.outputs.report_name }}

    steps:
      - name: Checkout code onto VM
        uses: actions/checkout@v4

      - name: Set run metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          RUN_DATE=$(date +%Y-%m-%d)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "short_sha=${SHORT_SHA}"    >> $GITHUB_OUTPUT
          echo "run_date=${RUN_DATE}"      >> $GITHUB_OUTPUT
          echo "report_name=security-report-${BRANCH}-${SHORT_SHA}-${RUN_DATE}" >> $GITHUB_OUTPUT

      - name: Determine ZAP scan mode
        id: zap-mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.zap_scan_type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || \
               [ "${{ github.ref }}" = "refs/heads/develop" ] || \
               [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=baseline" >> $GITHUB_OUTPUT
          fi

      # ── Check and auto-install Docker ──────────────────────────────────────
      - name: Check and install Docker if missing
        run: |
          if command -v docker &>/dev/null; then
            echo "✓ Docker already installed: $(docker --version)"
          else
            echo "Docker not found — installing..."
            sudo apt-get update -qq
            sudo apt-get install -y docker.io
            sudo usermod -aG docker $USER
            sudo systemctl start docker
            sudo systemctl enable docker
            echo "✓ Docker installed: $(docker --version)"
          fi
          # Verify docker works (use sudo if group not yet active)
          docker ps 2>/dev/null || sudo docker ps

      # ── Check and auto-install Node.js ─────────────────────────────────────
      - name: Check and install Node.js if missing
        run: |
          # Try all known locations first
          export PATH="/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH"
          export NVM_DIR="${HOME}/.nvm"
          [ -s "${NVM_DIR}/nvm.sh" ] && source "${NVM_DIR}/nvm.sh"

          if command -v node &>/dev/null; then
            echo "✓ Node.js already installed: $(node --version)"
          else
            echo "Node.js not found — installing via NodeSource..."
            curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
            sudo apt-get install -y nodejs
            echo "✓ Node.js installed: $(node --version)"
            echo "✓ npm installed: $(npm --version)"
          fi

          # Make sure node is in PATH for all subsequent steps
          NODE_PATH=$(which node)
          NODE_DIR=$(dirname $NODE_PATH)
          echo "NODE_DIR=${NODE_DIR}" >> $GITHUB_ENV
          echo "PATH=${NODE_DIR}:$PATH" >> $GITHUB_ENV
          echo "Node path: ${NODE_PATH}"

      # ── Check and install npm if missing ───────────────────────────────────
      - name: Check and install npm if missing
        run: |
          export PATH="${{ env.NODE_DIR }}:$PATH"
          if command -v npm &>/dev/null; then
            echo "✓ npm already installed: $(npm --version)"
          else
            echo "npm not found — installing..."
            sudo apt-get install -y npm
            echo "✓ npm installed: $(npm --version)"
          fi

      # ── Check and install curl if missing ──────────────────────────────────
      - name: Check and install curl if missing
        run: |
          if command -v curl &>/dev/null; then
            echo "✓ curl already installed: $(curl --version | head -1)"
          else
            echo "curl not found — installing..."
            sudo apt-get update -qq
            sudo apt-get install -y curl
            echo "✓ curl installed"
          fi

      - name: Create workspace directories
        run: |
          mkdir -p ~/security-scan/reports
          mkdir -p ~/security-scan/app
          mkdir -p ~/security-scan/scripts
          mkdir -p ~/.dependency-check/data
          echo "✓ Workspace directories ready"

      - name: Print environment summary
        run: |
          echo "================================================"
          echo " Environment Summary"
          echo "================================================"
          echo "Node.js : $(node --version 2>/dev/null || echo NOT FOUND)"
          echo "npm     : $(npm --version 2>/dev/null || echo NOT FOUND)"
          echo "Docker  : $(docker --version 2>/dev/null || sudo docker --version 2>/dev/null || echo NOT FOUND)"
          echo "curl    : $(curl --version 2>/dev/null | head -1 || echo NOT FOUND)"
          echo "OS      : $(uname -a)"
          echo "User    : $(whoami)"
          echo "Home    : $HOME"
          echo "================================================"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — RUN ALL SCANS ON VM
  # ───────────────────────────────────────────────────────────────────────────
  run-scans:
    name: "Run All Scans on GCP VM"
    runs-on: self-hosted
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy code and scan script to workspace
        run: |
          mkdir -p ~/security-scan/app
          mkdir -p ~/security-scan/scripts
          cp -r . ~/security-scan/app/
          cp .github/scripts/run-all-scans.sh ~/security-scan/scripts/run-all-scans.sh
          chmod +x ~/security-scan/scripts/run-all-scans.sh
          echo "✓ Code and scripts ready"

      - name: Run all security scans
        env:
          ZAP_MODE:                   ${{ needs.prepare.outputs.zap_mode }}
          GIT_SHA:                    ${{ github.sha }}
          GIT_BRANCH:                 ${{ github.ref_name }}
          RUN_DATE:                   ${{ needs.prepare.outputs.run_date }}
          SONAR_HOST_URL:             ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN:                ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY:          ${{ secrets.SONAR_PROJECT_KEY }}
          NVD_API_KEY:                ${{ secrets.NVD_API_KEY }}
          DEFECTDOJO_URL:             ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY:         ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID:   ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
          DEFECTDOJO_PRODUCT_ID:      ${{ secrets.DEFECTDOJO_PRODUCT_ID }}
        run: |
          # Ensure node is in PATH for run-all-scans.sh
          export PATH="/usr/local/bin:/usr/bin:$PATH"
          export NVM_DIR="${HOME}/.nvm"
          [ -s "${NVM_DIR}/nvm.sh" ] && source "${NVM_DIR}/nvm.sh"
          bash ~/security-scan/scripts/run-all-scans.sh
        timeout-minutes: 75

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — UPLOAD REPORT AS GITHUB ARTIFACT
  # ───────────────────────────────────────────────────────────────────────────
  collect-report:
    name: "Upload Report as GitHub Artifact"
    runs-on: self-hosted
    needs: [prepare, run-scans]
    if: always() && needs.run-scans.result != 'cancelled'

    steps:
      - name: Find and rename report file
        id: find
        run: |
          REPORT=$(ls ~/security-scan/reports/final-report.* 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            EXT="${REPORT##*.}"
            NAMED="~/security-scan/reports/${{ needs.prepare.outputs.report_name }}.${EXT}"
            cp "$REPORT" "${NAMED}"
            echo "report_file=${{ needs.prepare.outputs.report_name }}.${EXT}" >> $GITHUB_OUTPUT
            echo "✓ Report found: $REPORT"
          else
            echo "No final report found — uploading all raw scan reports"
          fi

      - name: Upload report as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.report_name }}
          path: ~/security-scan/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Write job summary
        run: |
          echo "## Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.prepare.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Date | ${{ needs.prepare.outputs.run_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZAP Mode | ${{ needs.prepare.outputs.zap_mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ran on | GCP VM (self-hosted runner) |" >> $GITHUB_STEP_SUMMARY
          echo "| Report | \`${{ steps.find.outputs.report_file }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the report from the Artifacts section above." >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — CLEANUP VM WORKSPACE
  # ───────────────────────────────────────────────────────────────────────────
  cleanup:
    name: "Cleanup VM Workspace"
    runs-on: self-hosted
    needs: collect-report
    if: always()

    steps:
      - name: Stop and remove scan containers
        run: |
          docker rm -f zap-scan dep-check mongo-scan redis-scan 2>/dev/null \
            || sudo docker rm -f zap-scan dep-check mongo-scan redis-scan 2>/dev/null \
            || true
          echo "✓ Containers cleaned up"

      - name: Remove app code from workspace
        run: |
          rm -rf ~/security-scan/app/
          echo "✓ Workspace cleaned up"